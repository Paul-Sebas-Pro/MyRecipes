name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: myrecipes
          POSTGRES_PASSWORD: myrecipes
          POSTGRES_DB: myrecipes_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U myrecipes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm install

      - name: Lint
        working-directory: api
        run: npm run lint

      - name: Tests d'intégration
        working-directory: api
        run: npm test
        env:
          DATABASE_URL: postgres://myrecipes:myrecipes@localhost:5433/myrecipes_test
          DATABASE_URL_TEST: postgres://myrecipes:myrecipes@localhost:5433/myrecipes_test
          JWT_SECRET: ci_jwt_secret_min_32_chars_here_ok
          NODE_ENV: test
