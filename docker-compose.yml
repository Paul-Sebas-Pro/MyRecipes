services:
  postgres:
    image: postgres:17-alpine
    container_name: myrecipes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-myrecipes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myrecipes}
      POSTGRES_DB: ${DB_NAME:-myrecipes}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myrecipes}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:17-alpine
    container_name: myrecipes_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-myrecipes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myrecipes}
      POSTGRES_DB: myrecipes_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myrecipes}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: myrecipes_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER:-myrecipes}:${DB_PASSWORD:-myrecipes}@postgres:5432/${DB_NAME:-myrecipes}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: myrecipes_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api

  adminer:
    image: adminer:latest
    container_name: myrecipes_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  postgres_test_data:
